name: Leitner Box CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    if: github.event_name == 'pull_request'
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: leitner-box
          build-args: SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Running container
        run: |
          docker run -d --name leitner-box -p 8080:8000 leitner-box

      - name: Wait for app
        run: sleep 2

      - name: Test health and version
        run: |
          curl -sf http://localhost:8080/api/health | grep -q '"status":"ok"'
          curl -sf http://localhost:8080/api/version | grep -q ${{ github.sha }}

      - name: Stop container
        run: |
          docker stop leitner-box

  build_and_push_to_docker_hub:
    if: github.event_name == 'push'
    name: Build Docker Image with tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag previous
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:latest && \
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:latest ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:previous && \
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:previous || true

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:latest
          build-args: SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:latest

  trigger_watchtower:
    if: github.event_name == 'push'
    needs: build_and_push_to_docker_hub
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via n8n
        run: |
          curl -H "Content-Type: application/json" "https://n8n.gcourtot.fr/webhook/${{ secrets.N8N_WEBHOOK_ID_LEITNER }}"

  test_prod:
    if: github.event_name == 'push'
    needs: trigger_watchtower
    runs-on: ubuntu-latest
    steps:
      - name: Wait for watchtower
        run: sleep 30

      - name: Test version
        run: |
          for i in {1..10}; do
            curl -sf https://leitner.gcourtot.fr/api/version | grep -q ${{ github.sha }} && exit 0
            sleep 10
          done
          exit 1

  trigger_rollback:
    needs: [test_prod, build_and_push_to_docker_hub]
    if: always() && needs.test_prod.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Rollback image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:previous
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:previous ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/leitner-box:latest

      - name: Trigger deploy via n8n
        run: |
          curl -H "Content-Type: application/json" "https://n8n.gcourtot.fr/webhook/${{ secrets.N8N_WEBHOOK_ID_LEITNER }}"
